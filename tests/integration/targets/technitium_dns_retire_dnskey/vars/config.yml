---
# Configuration for technitium_dns_retire_dnskey integration tests

# Test zone data for DNSKEY retirement testing
# retire-dnskey-test1 is created when the test servers are initialized to allow time for key publishing
# see tests/integration/targets/setup_testing_env
retire_dnskey_test_zones:
  - zone: "retire-dnskey-test1.{{ testing_suffix }}"
  - zone: "retire-dnskey-test2.{{ testing_suffix }}"

retire_dnskey_test_zones_to_create:
  - zone: "retire-dnskey-test2.{{ testing_suffix }}"